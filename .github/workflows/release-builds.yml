name: Release builds

# Builds the desktop installers on native runners and attaches them to a
# GitHub Release so the website download links resolve.
#
# Run manually from the Actions tab (workflow_dispatch) and pass the release
# tag (defaults to v1.0.0), or it runs automatically when a v* tag is pushed.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the installers to"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux
            bundles: deb,rpm,appimage
            artifacts: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - os: windows-latest
            name: Windows
            bundles: nsis
            artifacts: |
              src-tauri/target/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build ${{ matrix.name }} bundles
        run: npm run build && npx tauri build --bundles ${{ matrix.bundles }}

      - name: Attach installers to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.artifacts }}
          fail_on_unmatched_files: true
